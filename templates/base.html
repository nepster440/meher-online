{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}" />

    <title>MEHER Dashboard</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap_min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/font_awesome_all_min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <div class="layout">
      <!-- ===== SIDEBAR ===== -->
      <div class="sidebar" id="sidebar">
        <div class="logo-box">
          <img src="{% static 'images/logo.png' %}" width="40" />
          <span
            ><big
              ><big><big>M</big></big></big
            >E<big
              ><big><big>H</big></big></big
            >E<big
              ><big><big>R</big></big></big
            ></span
          >
        </div>

        <ul class="nav flex-column mt-4">
          <li class="nav-item">
            <a
              href="{% url 'dashboard' %}"
              class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active-link{% endif %}"
            >
              <i class="fa-solid fa-house"></i> <span>Dashboard</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="{% url 'data_entry' %}"
              class="nav-link {% if 'data' in request.path %}active-link{% endif %}"
            >
              <i class="fa-solid fa-table"></i> <span>Data Entry</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="{% url 'monthly' %}"
              class="nav-link {% if 'monthly' in request.path %}active-link{% endif %}"
            >
              <i class="fa-solid fa-calendar"></i> <span>Monthly</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="{% url 'yearly' %}"
              class="nav-link {% if 'yearly' in request.path %}active-link{% endif %}"
            >
              <i class="fa-solid fa-chart-line"></i> <span>Yearly</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="{% url 'billing' %}"
              class="nav-link {% if '/billing/' == request.path %}active-link{% endif %}"
            >
              <i class="fa-solid fa-file-invoice"></i> <span>Billing</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="{% url 'bill_history' %}"
              class="nav-link {% if 'history' in request.path %}active-link{% endif %}"
            >
              <i class="fa-solid fa-clock-rotate-left"></i>
              <span>Bill History</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="{% url 'expense' %}"
              class="nav-link {% if 'expense' in request.path %}active-link{% endif %}"
            >
              <i class="fa-solid fa-money-bill-wave"></i> <span>Expense</span>
            </a>
          </li>
          
          <li class="nav-item">
            <a
              href="{% url 'udhaar' %}"
              class="nav-link {% if 'udhaar' in request.path %}active-link{% endif %}"
            >
              <i class="fa-solid fa-hand-holding-usd"></i> <span>💰 Udhaar</span>
            </a>
          </li>
          
          

          <li class="nav-item mt-3">
            <form
              action="{% url 'logout' %}"
              method="post"
              style="display: inline"
            >
              {% csrf_token %}
              <button
                type="submit"
                class="nav-link text-danger"
                style="
                  background: none;
                  border: none;
                  cursor: pointer;
                  width: 100%;
                  text-align: left;
                "
              >
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
              </button>
            </form>
          </li>
        </ul>
      </div>

      <!-- ===== LOADER ===== -->
      <div id="loader" class="loader">
        <div class="loader-box">Loading...</div>
      </div>
      <!-- ===== MAIN ===== -->
      <div class="main">
        <!-- ===== TOPBAR ===== -->
        <div class="topbar">
          <button class="menu-btn me-3" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
          </button>

          <h1 class="mb-0"><strong>Meher Computing and Online</strong></h1>

          <!-- ===== RIGHT SIDE (DARK MODE ICON) ===== -->
          <div class="topbar-right">
            <button class="theme-icon-btn" onclick="toggleTheme()">
              <i id="themeIcon" class="fa-solid fa-moon"></i>
            </button>
          </div>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="content">{% block content %}{% endblock %}</div>

        <!-- ===== FOOTER ===== -->
        <footer class="footer text-center">
          <p>© {% now "Y" %} MEHER | Created by NEPSTER 🚀</p>
        </footer>
      </div>
    </div>

    <!-- JS -->
    <script src="{% static 'js/loader.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>
    <script src="{% static 'js/sidebar.js' %}"></script>
  </body>
</html>
