{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid" style="position: relative; z-index: 1;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white"><i class="fa-solid fa-file-invoice"></i> Billing</h2>
        <div class="glass-card px-3 py-2">
            <span class="text-neon" id="displayInvoice" style="font-weight: bold;">Invoice: Auto-Generated</span>
        </div>
    </div>

    <div class="glass-card p-4" style="position: relative; z-index: 10;">
        {% csrf_token %}

        <div class="row mb-4">
            <div class="col-md-6">
                <label class="text-white small mb-2">Customer Name</label>
                <input type="text" id="customer" class="form-control neon-input" placeholder="Enter Customer Name">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table-neon text-center w-100">
                <thead>
                    <tr>
                        <th style="width: 50px;">No</th>
                        <th>Service Description</th>
                        <th style="width: 100px;">Qty</th>
                        <th style="width: 150px;">Price</th>
                        <th style="width: 150px;">Total</th>
                        <th style="width: 80px;">Action</th>
                    </tr>
                </thead>
                <tbody id="billBody">
                    <tr>
                        <td class="row-no">1</td>
                        <td><input type="text" class="input service-name" placeholder="Enter service..."></td>
                        <td><input type="number" class="input qty" value="1"></td>
                        <td><input type="number" class="input price" value="0"></td>
                        <td class="row-total">0.00</td>
                        <td>
                            <button type="button" onclick="window.deleteRow(this)" class="btn-delete">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-end mt-4">
            <div class="glass-card p-3" style="border: 1px solid #00f2ff;">
                <h4 class="m-0 text-white">Grand Total: ₹ <span id="grandTotal" class="text-neon">0.00</span></h4>
            </div>
        </div>

        <div class="text-center mt-5 d-flex justify-content-center gap-3">
            <button type="button" class="btn-action" onclick="window.addRow()">
                <i class="fa-solid fa-plus"></i> Add Row
            </button>
            <button type="button" class="btn-action btn-save" onclick="window.saveBill()">
                <i class="fa-solid fa-floppy-disk"></i> Save Bill
            </button>
            <button type="button" class="btn-action btn-print" onclick="window.downloadPDF()">
                <i class="fa-solid fa-print"></i> Print PDF
            </button>
        </div>
    </div>
</div>

<style>
    /* Click block hatane ke liye critical CSS */
    .btn-action, .btn-delete, .input, .neon-input {
        position: relative !important;
        z-index: 999 !important;
        pointer-events: auto !important;
        cursor: pointer !important;
    }

    .btn-action {
        padding: 12px 25px;
        background: rgba(0, 242, 255, 0.1);
        border: 1px solid #00f2ff;
        color: white;
        border-radius: 8px;
        transition: 0.3s;
    }

    .btn-action:hover {
        background: #00f2ff;
        color: black;
        box-shadow: 0 0 20px #00f2ff;
    }

    .neon-input {
        background: rgba(255, 255, 255, 0.05) !important;
        color: white !important;
        border: 1px solid #00f2ff;
    }

    .table-neon .input {
        width: 100%;
        background: transparent;
        border: none;
        color: white;
        text-align: center;
        outline: none;
    }
</style>
<script src="{% static 'js/billing.js' %}"></script>
{% endblock %}
